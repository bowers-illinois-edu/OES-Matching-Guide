name: Render and publish guide

# Render the Quarto guide and publish it to GitHub Pages via the
# GitHub Actions deployment path (no rendered HTML is committed to the repo).
on:
  push:
    branches: [main]
    paths:
      - 'making_and_evaluating_matched_designs.qmd'
      - 'big.bib'
      - '_quarto.yml'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Installs from Posit Package Manager binaries and caches the library
      # between runs, so only the first build pays the full compile cost.
      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::renv
            any::tidyverse
            any::RItools
            any::optmatch
            any::designmatch
            any::highs
            any::coin
            any::conflicted
            any::estimatr
            any::senstrat
            any::sensemakr
            any::formula.tools
            any::gridExtra
            any::arm
            any::MASS

      - name: Render the guide
        run: quarto render

      # The render produces docs/making_and_evaluating_matched_designs.html;
      # add a root index.html that redirects there so the site root works.
      - name: Add root redirect to the guide
        run: |
          cat > docs/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=making_and_evaluating_matched_designs.html">
          <link rel="canonical" href="making_and_evaluating_matched_designs.html">
          <title>The OES Guide to Making and Evaluating Matched Designs</title>
          </head>
          <body>
          <p>Redirecting to <a href="making_and_evaluating_matched_designs.html">the guide</a>.</p>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
